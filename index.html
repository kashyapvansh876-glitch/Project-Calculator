<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
  <div class="main-container">
        <h1>Calculator</h1>
        <div class="small-box">

        </div>
        <div class="first-row-button">
            <button class="b1">AC</button>
            <button class="b2">DEL</button>
            <button class="b3">%</button>
            <button class="b4">/</button>
        </div>
        <div class="sec-row-button">
            <button class="b5">1</button>
            <button class="b6">2</button>
            <button class="b7">3</button>
            <button class="b8">*</button>
        </div>
        <div class="third-row-button">
            <button class="b9">4</button>
            <button class="b10">5</button>
            <button class="b11">6</button>
            <button class="b12">+</button>
        </div>
        <div class="four-row-button">
            <button class="b13">7</button>
            <button class="b14">8</button>
            <button class="b15">9</button>
            <button class="b16">-</button>
        </div>
        <div class="five-row-button">
            <button class="b17">0</button>
            <button class="b18">.</button>
            <button class="b19">=</button>
            <button class="b20">()</button>
        </div>
  </div>

     <script src="script.js"></script>
</body>
</html>
